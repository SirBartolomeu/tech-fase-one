<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <style>
    text{font-family:Arial, sans-serif;font-size:18px;fill:#17202a} .title{font-size:34px;font-weight:700}
    .actor{fill:#ffe08a;stroke:#8a6d00}.cmd{fill:#a7d8ff;stroke:#246b9b}.event{fill:#ffb36b;stroke:#a65300}
    .policy{fill:#d9c2ff;stroke:#6d45a3}.risk{fill:#ffb3c7;stroke:#a33b5c}.pivot{stroke:#111;stroke-width:3;stroke-dasharray:8 8}
    .lane{stroke:#444;stroke-width:2;marker-end:url(#arrow)} .small{font-size:14px}.ctx{font-size:22px;font-weight:700}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#444"/></marker></defs>
  <text x="40" y="55" class="title">Event Storming - Fase 2 Oficina MVP</text>
  <line x1="80" y1="470" x2="1500" y2="470" class="lane"/>
  <text x="70" y="120" class="ctx">Identidade</text><line x1="255" y1="95" x2="255" y2="830" class="pivot"/><text x="210" y="855" class="small">pivotal: Token JWT gerado</text>
  <text x="315" y="120" class="ctx">Cadastros</text><line x1="570" y1="95" x2="570" y2="830" class="pivot"/><text x="505" y="855" class="small">pivotal: Cadastros base preparados</text>
  <text x="640" y="120" class="ctx">Ordem de Servico</text><line x1="830" y1="95" x2="830" y2="830" class="pivot"/><text x="795" y="855" class="small">pivotal: OS criada</text>
  <text x="900" y="120" class="ctx">Decisao</text><line x1="1090" y1="95" x2="1090" y2="830" class="pivot"/><text x="1035" y="855" class="small">pivotal: Orcamento enviado</text>
  <text x="1170" y="120" class="ctx">Execucao</text><line x1="1400" y1="95" x2="1400" y2="830" class="pivot"/><text x="1360" y="855" class="small">pivotal: OS entregue</text>
  <rect x="70" y="170" width="150" height="50" rx="8" class="actor"/><text x="95" y="202">Admin</text>
  <rect x="70" y="250" width="150" height="70" rx="8" class="cmd"/><text x="92" y="280">Autentique</text><text x="92" y="305" class="small">POST /auth/token</text>
  <rect x="70" y="380" width="170" height="60" rx="8" class="event"/><text x="90" y="415">Token gerado</text>
  <rect x="310" y="170" width="180" height="50" rx="8" class="actor"/><text x="340" y="202">Atendente</text>
  <rect x="300" y="250" width="220" height="80" rx="8" class="cmd"/><text x="325" y="280">Cadastre base</text><text x="325" y="305" class="small">customers/vehicles</text><text x="325" y="325" class="small">services/parts</text>
  <rect x="300" y="380" width="225" height="60" rx="8" class="event"/><text x="320" y="415">Base preparada</text>
  <rect x="610" y="210" width="190" height="70" rx="8" class="cmd"/><text x="632" y="242">Abra OS</text><text x="632" y="265" class="small">POST /work-orders</text>
  <rect x="610" y="330" width="190" height="65" rx="8" class="policy"/><text x="632" y="360">Valide dominio</text><text x="632" y="382" class="small">doc, placa, itens</text>
  <rect x="610" y="430" width="190" height="70" rx="8" class="event"/><text x="632" y="460">OS criada</text><text x="632" y="482" class="small">orcamento calculado</text>
  <rect x="610" y="560" width="190" height="65" rx="8" class="event"/><text x="632" y="592">Estoque debitado</text>
  <rect x="880" y="210" width="190" height="70" rx="8" class="cmd"/><text x="900" y="242">Envie orcamento</text><text x="900" y="265" class="small">send-budget</text>
  <rect x="880" y="350" width="190" height="70" rx="8" class="event"/><text x="900" y="382">Orcamento enviado</text>
  <rect x="880" y="540" width="190" height="75" rx="8" class="risk"/><text x="900" y="570">Pontos de atencao</text><text x="900" y="592" class="small">estoque/transicao/doc</text>
  <rect x="1140" y="170" width="190" height="50" rx="8" class="actor"/><text x="1165" y="202">Sistema externo</text>
  <rect x="1140" y="250" width="220" height="80" rx="8" class="cmd"/><text x="1160" y="280">Decida orcamento</text><text x="1160" y="305" class="small">X-Integration-Token</text>
  <rect x="1140" y="380" width="220" height="75" rx="8" class="event"/><text x="1160" y="410">Decisao recebida</text><text x="1160" y="432" class="small">aprovado/recusado</text>
  <rect x="1140" y="540" width="220" height="65" rx="8" class="policy"/><text x="1160" y="570">Notifique status</text><text x="1160" y="592" class="small">SMTP ou log</text>
  <rect x="1405" y="210" width="150" height="70" rx="8" class="cmd"/><text x="1425" y="242">Finalize</text><text x="1425" y="265" class="small">e entregue</text>
  <rect x="1405" y="350" width="150" height="70" rx="8" class="event"/><text x="1425" y="382">OS entregue</text>
  <rect x="1405" y="540" width="150" height="70" rx="8" class="actor"/><text x="1435" y="572">Cliente</text>
  <rect x="1405" y="650" width="150" height="70" rx="8" class="cmd"/><text x="1425" y="682">Consulte</text><text x="1425" y="705" class="small">tracking publico</text>
</svg>
