<rect x="0" y="0" width="3600" height="2050" fill="#f7f9fc" stroke="#d7e0ea" stroke-width="1.5" />
<text x="60" y="70" class="title">Event Storming - Oficina MVP</text>
<text x="60" y="104" class="subtitle">Linha do tempo com eventos em passado, comandos no imperativo, politicas, atores, pontos de atencao e eventos pivotais</text>

<rect x="60" y="130" width="3300" height="105" rx="12" fill="#ffffff" stroke="#c8d4e0" stroke-width="1.5" />
<text x="80" y="160" class="section">Legenda da aula</text>
<rect x="80" y="180" width="150" height="38" rx="4" fill="#f6b26b" stroke="#b57935" />
<text x="96" y="204" class="small">evento (passado)</text>
<rect x="260" y="180" width="150" height="38" rx="4" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="276" y="204" class="small">comando (imperativo)</text>
<rect x="440" y="180" width="130" height="38" rx="4" fill="#ffd966" stroke="#b59b31" />
<text x="456" y="204" class="small">ator</text>
<rect x="600" y="180" width="150" height="38" rx="4" fill="#d9d2e9" stroke="#9a8fb3" />
<text x="616" y="204" class="small">politica</text>
<rect x="805" y="180" width="90" height="38" transform="rotate(45 850 199)" fill="#f4cccc" stroke="#9a5a5a" />
<text x="915" y="204" class="small">ponto de atencao</text>
<line x1="1095" y1="180" x2="1095" y2="220" stroke="#7b2d00" stroke-width="4" stroke-dasharray="8 5" />
<text x="1115" y="204" class="small">evento pivotal / troca de fase</text>
<rect x="1370" y="180" width="170" height="38" rx="4" fill="#ffe599" stroke="#baa84f" />
<text x="1386" y="204" class="small">agregado / entidade</text>

<line x1="110" y1="1030" x2="3380" y2="1030" stroke="#26384d" stroke-width="3" marker-end="url(#arrow)" />
<text x="110" y="1000" class="section">Linha do tempo principal do processo</text>

<line x1="520" y1="285" x2="520" y2="1790" stroke="#7b2d00" stroke-width="4" stroke-dasharray="10 8" />
<text x="445" y="270" class="pivotal">evento pivotal</text>
<text x="425" y="1830" class="pivotal">Token JWT gerado</text>

<line x1="1110" y1="285" x2="1110" y2="1790" stroke="#7b2d00" stroke-width="4" stroke-dasharray="10 8" />
<text x="1008" y="1830" class="pivotal">Cadastros base preparados</text>

<line x1="1700" y1="285" x2="1700" y2="1790" stroke="#7b2d00" stroke-width="4" stroke-dasharray="10 8" />
<text x="1652" y="1830" class="pivotal">OS criada</text>

<line x1="2290" y1="285" x2="2290" y2="1790" stroke="#7b2d00" stroke-width="4" stroke-dasharray="10 8" />
<text x="2220" y="1830" class="pivotal">Orcamento enviado</text>

<line x1="2625" y1="285" x2="2625" y2="1790" stroke="#7b2d00" stroke-width="4" stroke-dasharray="10 8" />
<text x="2554" y="1830" class="pivotal">Orcamento aprovado</text>

<line x1="3150" y1="285" x2="3150" y2="1790" stroke="#7b2d00" stroke-width="4" stroke-dasharray="10 8" />
<text x="3102" y="1830" class="pivotal">OS entregue</text>

<text x="120" y="330" class="section">Autenticacao</text>
<rect x="120" y="365" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="138" y="398" class="cardTitle">Ator: Admin</text>
<rect x="120" y="455" width="230" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="138" y="485" class="cardTitle">Autenticar admin</text>
<text x="138" y="508" class="cardText">POST /api/auth/token</text>
<text x="138" y="528" class="cardText">Enviar username/password</text>
<rect x="120" y="580" width="230" height="92" rx="5" fill="#d9d2e9" stroke="#9a8fb3" />
<text x="138" y="610" class="cardTitle">Politica</text>
<text x="138" y="633" class="cardText">Validar AdminCredentials</text>
<text x="138" y="653" class="cardText">e configuracao Jwt</text>
<rect x="430" y="455" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="448" y="485" class="cardTitle">Token JWT gerado</text>
<text x="448" y="508" class="cardText">TokenResponse retornado</text>
<text x="448" y="528" class="cardText">Bearer disponivel</text>
<rect x="290" y="740" width="118" height="118" transform="rotate(45 349 799)" fill="#f4cccc" stroke="#9a5a5a" />
<text x="283" y="795" class="cardText">ponto de atencao</text>
<text x="278" y="815" class="cardText">credenciais invalidas</text>
<line x1="350" y1="502" x2="430" y2="502" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />

<text x="720" y="330" class="section">Cadastros base</text>
<rect x="720" y="365" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="738" y="398" class="cardTitle">Ator: Admin</text>
<rect x="720" y="455" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="738" y="485" class="cardTitle">Cadastrar cliente</text>
<text x="738" y="508" class="cardText">CRUD /api/customers</text>
<rect x="720" y="580" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="738" y="610" class="cardTitle">Vincular veiculo</text>
<text x="738" y="633" class="cardText">CRUD /api/vehicles</text>
<rect x="720" y="705" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="738" y="735" class="cardTitle">Cadastrar servico</text>
<text x="738" y="758" class="cardText">CRUD /api/services</text>
<rect x="720" y="830" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="738" y="860" class="cardTitle">Cadastrar peca</text>
<text x="738" y="883" class="cardText">CRUD /api/parts</text>
<rect x="1030" y="455" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1048" y="485" class="cardTitle">Cliente cadastrado</text>
<text x="1048" y="508" class="cardText">Customer persistido</text>
<rect x="1030" y="580" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1048" y="610" class="cardTitle">Veiculo vinculado</text>
<text x="1048" y="633" class="cardText">Vehicle persistido</text>
<rect x="1030" y="705" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1048" y="735" class="cardTitle">Servico cadastrado</text>
<text x="1048" y="758" class="cardText">RepairService disponivel</text>
<rect x="1030" y="830" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1048" y="860" class="cardTitle">Peca cadastrada</text>
<text x="1048" y="883" class="cardText">PartSupply disponivel</text>
<rect x="1315" y="455" width="260" height="110" rx="5" fill="#d9d2e9" stroke="#9a8fb3" />
<text x="1333" y="485" class="cardTitle">Politica</text>
<text x="1333" y="508" class="cardText">Documento, placa, preco,</text>
<text x="1333" y="528" class="cardText">duracao e estoque validos</text>
<rect x="1400" y="730" width="120" height="120" transform="rotate(45 1460 790)" fill="#f4cccc" stroke="#9a5a5a" />
<text x="1396" y="786" class="cardText">ponto de atencao</text>
<text x="1390" y="806" class="cardText">dados invalidos</text>
<line x1="970" y1="502" x2="1030" y2="502" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="970" y1="627" x2="1030" y2="627" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="970" y1="752" x2="1030" y2="752" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="970" y1="877" x2="1030" y2="877" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />

<text x="1360" y="330" class="section">Abertura da OS</text>
<rect x="1360" y="365" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="1378" y="398" class="cardTitle">Ator: Admin</text>
<rect x="1360" y="455" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="1378" y="485" class="cardTitle">Criar OS</text>
<text x="1378" y="508" class="cardText">POST /api/work-orders</text>
<text x="1378" y="528" class="cardText">Informar cliente, veiculo e itens</text>
<rect x="1360" y="580" width="260" height="110" rx="5" fill="#d9d2e9" stroke="#9a8fb3" />
<text x="1378" y="610" class="cardTitle">Politica</text>
<text x="1378" y="633" class="cardText">OS deve ter item;</text>
<text x="1378" y="653" class="cardText">placa deve pertencer ao cliente;</text>
<text x="1378" y="673" class="cardText">estoque deve ser suficiente</text>
<rect x="1680" y="455" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1698" y="485" class="cardTitle">OS criada</text>
<text x="1698" y="508" class="cardText">WorkOrder Received</text>
<rect x="1945" y="455" width="240" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1963" y="485" class="cardTitle">Orcamento calculado</text>
<text x="1963" y="508" class="cardText">BudgetTotal definido</text>
<rect x="1945" y="590" width="240" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1963" y="620" class="cardTitle">Estoque debitado</text>
<text x="1963" y="643" class="cardText">PartSupply atualizado</text>
<rect x="1740" y="740" width="120" height="120" transform="rotate(45 1800 800)" fill="#f4cccc" stroke="#9a5a5a" />
<text x="1735" y="796" class="cardText">ponto de atencao</text>
<text x="1722" y="816" class="cardText">OS ou estoque invalido</text>
<line x1="1610" y1="502" x2="1680" y2="502" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="1910" y1="502" x2="1945" y2="502" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="1910" y1="528" x2="1945" y2="637" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />

<text x="2210" y="330" class="section">Ciclo operacional</text>
<rect x="2210" y="365" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="2228" y="398" class="cardTitle">Ator: Admin</text>
<rect x="2210" y="455" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="2228" y="485" class="cardTitle">Iniciar diagnostico</text>
<text x="2228" y="508" class="cardText">POST /start-diagnosis</text>
<rect x="2470" y="455" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="2488" y="485" class="cardTitle">OS em diagnostico</text>
<rect x="2210" y="590" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="2228" y="620" class="cardTitle">Enviar orcamento</text>
<text x="2228" y="643" class="cardText">POST /send-budget</text>
<rect x="2470" y="590" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="2488" y="620" class="cardTitle">Orcamento enviado</text>
<text x="2488" y="643" class="cardText">AwaitingApproval</text>
<rect x="2555" y="740" width="120" height="120" transform="rotate(45 2615 800)" fill="#f4cccc" stroke="#9a5a5a" />
<text x="2550" y="796" class="cardText">ponto de atencao</text>
<text x="2538" y="816" class="cardText">transicao invalida</text>
<line x1="2460" y1="502" x2="2470" y2="502" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="2460" y1="637" x2="2470" y2="637" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />

<rect x="2720" y="365" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="2738" y="398" class="cardTitle">Ator: Admin</text>
<rect x="2720" y="455" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="2738" y="485" class="cardTitle">Aprovar orcamento</text>
<text x="2738" y="508" class="cardText">POST /approve-budget</text>
<rect x="3010" y="455" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="3028" y="485" class="cardTitle">Orcamento aprovado</text>
<text x="3028" y="508" class="cardText">OS em execucao</text>
<rect x="2720" y="590" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="2738" y="620" class="cardTitle">Finalizar servico</text>
<text x="2738" y="643" class="cardText">POST /finalize</text>
<rect x="3010" y="590" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="3028" y="620" class="cardTitle">OS finalizada</text>
<rect x="2720" y="725" width="250" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="2738" y="755" class="cardTitle">Entregar veiculo</text>
<text x="2738" y="778" class="cardText">POST /deliver</text>
<rect x="3010" y="725" width="230" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="3028" y="755" class="cardTitle">OS entregue</text>
<text x="3028" y="778" class="cardText">Historico completo</text>
<line x1="2970" y1="502" x2="3010" y2="502" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="2970" y1="637" x2="3010" y2="637" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="2970" y1="772" x2="3010" y2="772" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />

<text x="120" y="1230" class="section">Consulta publica e metricas</text>
<rect x="120" y="1260" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="138" y="1293" class="cardTitle">Ator: Cliente</text>
<rect x="120" y="1350" width="300" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="138" y="1380" class="cardTitle">Consultar tracking</text>
<text x="138" y="1403" class="cardText">GET /api/client/work-orders/{id}</text>
<text x="138" y="1423" class="cardText">Informar document</text>
<rect x="470" y="1350" width="270" height="95" rx="5" fill="#d9d2e9" stroke="#9a8fb3" />
<text x="488" y="1380" class="cardTitle">Politica</text>
<text x="488" y="1403" class="cardText">Documento precisa ser</text>
<text x="488" y="1423" class="cardText">do cliente da OS</text>
<rect x="790" y="1350" width="270" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="808" y="1380" class="cardTitle">Tracking consultado</text>
<text x="808" y="1403" class="cardText">ClientTrackingResponse</text>
<rect x="1120" y="1350" width="120" height="120" transform="rotate(45 1180 1410)" fill="#f4cccc" stroke="#9a5a5a" />
<text x="1115" y="1406" class="cardText">ponto de atencao</text>
<text x="1098" y="1426" class="cardText">documento divergente</text>
<rect x="1400" y="1260" width="180" height="58" rx="5" fill="#ffd966" stroke="#b59b31" />
<text x="1418" y="1293" class="cardTitle">Ator: Admin</text>
<rect x="1400" y="1350" width="310" height="95" rx="5" fill="#9fc5e8" stroke="#5d8fbc" />
<text x="1418" y="1380" class="cardTitle">Consultar tempo medio</text>
<text x="1418" y="1403" class="cardText">GET /api/work-orders/metrics</text>
<rect x="1760" y="1350" width="270" height="95" rx="5" fill="#f6b26b" stroke="#b57935" />
<text x="1778" y="1380" class="cardTitle">Tempo medio calculado</text>
<text x="1778" y="1403" class="cardText">AverageExecutionTime</text>
<line x1="420" y1="1397" x2="470" y2="1397" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="740" y1="1397" x2="790" y2="1397" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />
<line x1="1710" y1="1397" x2="1760" y2="1397" stroke="#26384d" stroke-width="2.5" marker-end="url(#arrow)" />

<text x="2180" y="1230" class="section">Agregados e entidades</text>
<rect x="2180" y="1260" width="250" height="85" rx="5" fill="#ffe599" stroke="#baa84f" />
<text x="2198" y="1290" class="cardTitle">WorkOrder</text>
<text x="2198" y="1313" class="cardText">status, totais e historico</text>
<rect x="2465" y="1260" width="250" height="85" rx="5" fill="#ffe599" stroke="#baa84f" />
<text x="2483" y="1290" class="cardTitle">Customer + Vehicle</text>
<text x="2483" y="1313" class="cardText">documento, placa e vinculo</text>
<rect x="2750" y="1260" width="250" height="85" rx="5" fill="#ffe599" stroke="#baa84f" />
<text x="2768" y="1290" class="cardTitle">RepairService</text>
<text x="2768" y="1313" class="cardText">servico e preco de mao de obra</text>
<rect x="3035" y="1260" width="250" height="85" rx="5" fill="#ffe599" stroke="#baa84f" />
<text x="3053" y="1290" class="cardTitle">PartSupply</text>
<text x="3053" y="1313" class="cardText">peca, preco e estoque</text>
<rect x="2325" y="1380" width="310" height="85" rx="5" fill="#ffe599" stroke="#baa84f" />
<text x="2343" y="1410" class="cardTitle">AuthController + TokenService</text>
<text x="2343" y="1433" class="cardText">identidade e acesso administrativo</text>
<rect x="2675" y="1380" width="310" height="85" rx="5" fill="#ffe599" stroke="#baa84f" />
<text x="2693" y="1410" class="cardTitle">ClientTrackingController</text>
<text x="2693" y="1433" class="cardText">consulta publica segura</text>

<rect x="120" y="1630" width="3260" height="190" rx="12" fill="#ffffff" stroke="#c8d4e0" />
<text x="145" y="1665" class="section">Leitura dos eventos pivotais</text>
<text x="165" y="1705" class="cardText">
<tspan x="165" dy="0">1. Token JWT gerado: muda da fase anonima para area administrativa autenticada.</tspan>
<tspan x="165" dy="25">2. Cadastros base preparados: dados e catalogo passam a estar prontos para abrir OS.</tspan>
<tspan x="165" dy="25">3. OS criada: inicia o ciclo operacional do agregado WorkOrder.</tspan>
<tspan x="165" dy="25">4. Orcamento enviado: muda para decisao/aprovacao do cliente.</tspan>
<tspan x="165" dy="25">5. Orcamento aprovado: muda para execucao do servico.</tspan>
<tspan x="165" dy="25">6. OS entregue: encerra o fluxo operacional e estabiliza o historico.</tspan>
</text>

<text x="120" y="1900" class="small">Eventos estao no passado; comandos estao no imperativo; politicas representam regras/automacoes; losangos rosa indicam ponto de atencao.</text>
</svg>
