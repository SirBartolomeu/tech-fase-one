<text x="444" y="1048" class="boxText"><tspan x="444" dy="0">Entidade: Customer</tspan><tspan x="444" dy="24">- Documento unico</tspan><tspan x="444" dy="24">- Vinculo com veiculos</tspan></text>
<rect x="770" y="1010" width="300" height="150" rx="10" ry="10" fill="#ffe599" stroke="#baa84f" stroke-width="1.5" />
<text x="784" y="1048" class="boxText"><tspan x="784" dy="0">Entidade: Vehicle</tspan><tspan x="784" dy="24">- Placa unica</tspan><tspan x="784" dy="24">- Pertence a um cliente</tspan></text>
<rect x="1110" y="1010" width="300" height="150" rx="10" ry="10" fill="#ffe599" stroke="#baa84f" stroke-width="1.5" />
<text x="1124" y="1048" class="boxText"><tspan x="1124" dy="0">Entidade: PartSupply</tspan><tspan x="1124" dy="24">- Estoque</tspan><tspan x="1124" dy="24">- RemoveFromStock</tspan></text>
<rect x="1450" y="1010" width="300" height="150" rx="10" ry="10" fill="#ffe599" stroke="#baa84f" stroke-width="1.5" />
<text x="1464" y="1048" class="boxText"><tspan x="1464" dy="0">Entidade: RepairService</tspan><tspan x="1464" dy="24">- Preco de mao de obra</tspan><tspan x="1464" dy="24">- Duracao media</tspan></text>
<rect x="90" y="1220" width="300" height="150" rx="10" ry="10" fill="#d9d2e9" stroke="#9a8fb3" stroke-width="1.5" />
<text x="104" y="1258" class="boxText"><tspan x="104" dy="0">Politica: OS deve ter</tspan><tspan x="104" dy="24">ao menos servico ou peca</tspan></text>
<rect x="430" y="1220" width="300" height="150" rx="10" ry="10" fill="#d9d2e9" stroke="#9a8fb3" stroke-width="1.5" />
<text x="444" y="1258" class="boxText"><tspan x="444" dy="0">Politica: transicoes</tspan><tspan x="444" dy="24">de status invalidas</tspan><tspan x="444" dy="24">sao bloqueadas</tspan></text>
<rect x="770" y="1220" width="300" height="150" rx="10" ry="10" fill="#d9d2e9" stroke="#9a8fb3" stroke-width="1.5" />
<text x="784" y="1258" class="boxText"><tspan x="784" dy="0">Politica: cliente e placa</tspan><tspan x="784" dy="24">devem ser validos</tspan><tspan x="784" dy="24">e consistentes</tspan></text>
<rect x="1110" y="1220" width="300" height="150" rx="10" ry="10" fill="#d9d2e9" stroke="#9a8fb3" stroke-width="1.5" />
<text x="1124" y="1258" class="boxText"><tspan x="1124" dy="0">Politica: estoque nao</tspan><tspan x="1124" dy="24">pode ficar negativo</tspan></text>
<rect x="1450" y="1220" width="300" height="150" rx="10" ry="10" fill="#d9d2e9" stroke="#9a8fb3" stroke-width="1.5" />
<text x="1464" y="1258" class="boxText"><tspan x="1464" dy="0">Politica: endpoints</tspan><tspan x="1464" dy="24">administrativos exigem</tspan><tspan x="1464" dy="24">JWT valido</tspan></text>
<rect x="1810" y="1010" width="700" height="360" rx="10" ry="10" fill="#e8f4fd" stroke="#8fb0cf" stroke-width="1.5" />
<text x="1830" y="1045" class="boxTitle"><tspan x="1830" dy="0">Comandos expostos na API (controllers):</tspan></text>
<text x="1840" y="1080" class="boxText"><tspan x="1840" dy="0">- POST /api/work-orders</tspan><tspan x="1840" dy="30">- POST /api/work-orders/{id}/start-diagnosis</tspan><tspan x="1840" dy="30">- POST /api/work-orders/{id}/send-budget</tspan><tspan x="1840" dy="30">- POST /api/work-orders/{id}/approve-budget</tspan><tspan x="1840" dy="30">- POST /api/work-orders/{id}/finalize</tspan><tspan x="1840" dy="30">- POST /api/work-orders/{id}/deliver</tspan><tspan x="1840" dy="30">- GET /api/client/work-orders/{id}?document=...</tspan><tspan x="1840" dy="30">- CRUD: /api/customers, /api/vehicles, /api/services, /api/parts</tspan></text>
