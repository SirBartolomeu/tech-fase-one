<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <style>text{font-family:Arial,sans-serif;font-size:18px;fill:#1f2933}.title{font-size:32px;font-weight:700}.agg{fill:#fff3c4;stroke:#9a6b00;stroke-width:2}.entity{fill:#d6ecff;stroke:#2b6f9f;stroke-width:2}.policy{fill:#ead7ff;stroke:#6e40a3;stroke-width:2}.event{fill:#ffd0a6;stroke:#a65300;stroke-width:2}.cmd{fill:#b9e6ff;stroke:#0b6b95;stroke-width:2}.line{stroke:#333;stroke-width:2;marker-end:url(#arrow)}.small{font-size:14px}</style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10z" fill="#333"/></marker></defs>
  <text x="40" y="55" class="title">Agregados, Comandos, Eventos e Politicas</text>
  <rect x="520" y="120" width="330" height="190" rx="14" class="agg"/><text x="635" y="155">WorkOrder</text><text x="545" y="190" class="small">Invariantes:</text><text x="545" y="215" class="small">- OS tem ao menos um item</text><text x="545" y="240" class="small">- transicao de status valida</text><text x="545" y="265" class="small">- historico sempre registrado</text><text x="545" y="290" class="small">- orcamento calculado por linhas</text>
  <rect x="80" y="130" width="230" height="100" rx="10" class="entity"/><text x="155" y="165">Customer</text><text x="105" y="195" class="small">CPF/CNPJ valido</text>
  <rect x="80" y="290" width="230" height="100" rx="10" class="entity"/><text x="165" y="325">Vehicle</text><text x="105" y="355" class="small">placa valida, cliente fixo</text>
  <rect x="1030" y="130" width="250" height="100" rx="10" class="entity"/><text x="1095" y="165">RepairService</text><text x="1055" y="195" class="small">preco e duracao validos</text>
  <rect x="1030" y="290" width="250" height="100" rx="10" class="entity"/><text x="1110" y="325">PartSupply</text><text x="1055" y="355" class="small">estoque nao negativo</text>
  <line x1="310" y1="180" x2="520" y2="190" class="line"/><line x1="310" y1="340" x2="520" y2="240" class="line"/><line x1="1030" y1="180" x2="850" y2="205" class="line"/><line x1="1030" y1="340" x2="850" y2="260" class="line"/>
  <rect x="420" y="430" width="210" height="70" rx="10" class="cmd"/><text x="455" y="462">Abra OS</text><text x="445" y="485" class="small">POST /work-orders</text>
  <rect x="655" y="430" width="230" height="70" rx="10" class="cmd"/><text x="695" y="462">Transicione OS</text><text x="680" y="485" class="small">diagnostico -> entrega</text>
  <rect x="910" y="430" width="260" height="70" rx="10" class="cmd"/><text x="940" y="462">Decida orcamento</text><text x="935" y="485" class="small">endpoint de integracao</text>
  <rect x="250" y="570" width="250" height="95" rx="10" class="policy"/><text x="275" y="602">Politica: autorizacao</text><text x="275" y="627" class="small">JWT admin ou token externo</text>
  <rect x="540" y="570" width="260" height="95" rx="10" class="policy"/><text x="565" y="602">Politica: prioridade</text><text x="565" y="627" class="small">ativas, status, antigas primeiro</text>
  <rect x="840" y="570" width="260" height="95" rx="10" class="policy"/><text x="865" y="602">Politica: notificacao</text><text x="865" y="627" class="small">SMTP/log apos mudanca</text>
  <rect x="340" y="330" width="230" height="60" rx="10" class="event"/><text x="365" y="368">OS criada</text>
  <rect x="605" y="330" width="230" height="60" rx="10" class="event"/><text x="625" y="368">Orcamento enviado</text>
  <rect x="870" y="330" width="230" height="60" rx="10" class="event"/><text x="900" y="368">OS entregue</text>
</svg>
