<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="1700" viewBox="0 0 2600 1700">
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#34495e" />
</marker>
<style>
.title { font: 700 34px Arial, sans-serif; fill: #1f2d3d; }
.subtitle { font: 500 18px Arial, sans-serif; fill: #3c4f65; }
.laneTitle { font: 700 18px Arial, sans-serif; fill: #1f2d3d; }
.boxTitle { font: 700 16px Arial, sans-serif; fill: #12263a; }
.boxText { font: 500 14px Arial, sans-serif; fill: #1f2d3d; }
.small { font: 500 12px Arial, sans-serif; fill: #3a4a5f; }
.step { font: 700 13px Arial, sans-serif; fill: #ffffff; }
</style>
</defs>

<rect x="0" y="0" width="2600" height="1700" fill="#f5f8fc" stroke="#d7e0ea" stroke-width="1.5" />
<text x="60" y="70" class="title">Domain Storytelling - Oficina MVP</text>
<text x="60" y="102" class="subtitle">Autenticacao, cadastros, OS, estoque, tracking publico e fluxos de excecao baseados no codigo</text>

<rect x="50" y="140" width="2500" height="160" rx="10" fill="#fff3e0" stroke="#c8d4e0" stroke-width="1.5" />
<text x="70" y="170" class="laneTitle">Cliente</text>
<rect x="50" y="325" width="2500" height="160" rx="10" fill="#e8f4fd" stroke="#c8d4e0" stroke-width="1.5" />
<text x="70" y="355" class="laneTitle">Admin / Atendente</text>
<rect x="50" y="510" width="2500" height="160" rx="10" fill="#edf4ff" stroke="#c8d4e0" stroke-width="1.5" />
<text x="70" y="540" class="laneTitle">Sistema de Identidade</text>
<rect x="50" y="695" width="2500" height="160" rx="10" fill="#ecf9f1" stroke="#c8d4e0" stroke-width="1.5" />
<text x="70" y="725" class="laneTitle">Sistema Oficina / API</text>
<rect x="50" y="880" width="2500" height="160" rx="10" fill="#fff8df" stroke="#c8d4e0" stroke-width="1.5" />
<text x="70" y="910" class="laneTitle">Catalogo e Cadastro</text>
<rect x="50" y="1065" width="2500" height="160" rx="10" fill="#f3ecff" stroke="#c8d4e0" stroke-width="1.5" />
<text x="70" y="1095" class="laneTitle">Estoque e Politicas</text>

<rect x="150" y="365" width="250" height="86" rx="12" fill="#cde6ff" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="174" cy="387" r="15" fill="#2c5f8a" /><text x="169" y="392" class="step">1</text>
<text x="190" y="392" class="boxText"><tspan x="190" dy="0">Informa admin/senha</tspan><tspan x="190" dy="18">em /api/auth/token</tspan></text>

<rect x="470" y="550" width="260" height="86" rx="12" fill="#d8e9ff" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="494" cy="572" r="15" fill="#2c5f8a" /><text x="489" y="577" class="step">2</text>
<text x="510" y="577" class="boxText"><tspan x="510" dy="0">Valida credenciais</tspan><tspan x="510" dy="18">e gera token JWT</tspan></text>

<rect x="800" y="365" width="280" height="86" rx="12" fill="#cde6ff" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="824" cy="387" r="15" fill="#2c5f8a" /><text x="819" y="392" class="step">3</text>
<text x="840" y="392" class="boxText"><tspan x="840" dy="0">Usa Bearer token</tspan><tspan x="840" dy="18">nos endpoints admin</tspan></text>

<rect x="1130" y="920" width="300" height="86" rx="12" fill="#ffe599" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="1154" cy="942" r="15" fill="#2c5f8a" /><text x="1149" y="947" class="step">4</text>
<text x="1170" y="947" class="boxText"><tspan x="1170" dy="0">Mantem clientes, veiculos,</tspan><tspan x="1170" dy="18">servicos e pecas</tspan></text>

<rect x="1500" y="735" width="300" height="86" rx="12" fill="#cfeeda" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="1524" cy="757" r="15" fill="#2c5f8a" /><text x="1519" y="762" class="step">5</text>
<text x="1540" y="762" class="boxText"><tspan x="1540" dy="0">Cria OS com cliente,</tspan><tspan x="1540" dy="18">veiculo, servicos e pecas</tspan></text>

<rect x="1870" y="1105" width="320" height="86" rx="12" fill="#ddd2ff" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="1894" cy="1127" r="15" fill="#2c5f8a" /><text x="1889" y="1132" class="step">6</text>
<text x="1910" y="1132" class="boxText"><tspan x="1910" dy="0">Valida regras e debita</tspan><tspan x="1910" dy="18">estoque de PartSupply</tspan></text>

<rect x="1870" y="735" width="320" height="86" rx="12" fill="#cfeeda" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="1894" cy="757" r="15" fill="#2c5f8a" /><text x="1889" y="762" class="step">7</text>
<text x="1910" y="762" class="boxText"><tspan x="1910" dy="0">Calcula orcamento</tspan><tspan x="1910" dy="18">e registra status Received</tspan></text>

<rect x="1500" y="365" width="320" height="86" rx="12" fill="#cde6ff" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="1524" cy="387" r="15" fill="#2c5f8a" /><text x="1519" y="392" class="step">8</text>
<text x="1540" y="392" class="boxText"><tspan x="1540" dy="0">Executa transicoes:</tspan><tspan x="1540" dy="18">diagnostico ate entrega</tspan></text>

<rect x="2040" y="180" width="330" height="86" rx="12" fill="#ffdca8" stroke="#4a5a6a" stroke-width="1.5" />
<circle cx="2064" cy="202" r="15" fill="#2c5f8a" /><text x="2059" y="207" class="step">9</text>
<text x="2080" y="207" class="boxText"><tspan x="2080" dy="0">Consulta tracking publico</tspan><tspan x="2080" dy="18">com id da OS + documento</tspan></text>

<rect x="760" y="1105" width="400" height="86" rx="12" fill="#f4d6d6" stroke="#9a5a5a" stroke-width="1.5" />
<text x="780" y="1132" class="boxTitle">Fluxos de excecao bloqueados</text>
<text x="780" y="1157" class="boxText"><tspan x="780" dy="0">Credenciais invalidas, documento invalido, placa de outro cliente,</tspan><tspan x="780" dy="18">estoque insuficiente, OS sem item, transicao invalida, tracking divergente.</tspan></text>

<line x1="400" y1="408" x2="470" y2="593" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="730" y1="593" x2="800" y2="408" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="1080" y1="408" x2="1130" y2="963" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="1430" y1="963" x2="1500" y2="778" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="1800" y1="778" x2="1870" y2="1148" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="2030" y1="1105" x2="2030" y2="821" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="1870" y1="778" x2="1820" y2="408" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="1820" y1="408" x2="2040" y2="223" stroke="#34495e" stroke-width="2" marker-end="url(#arrow)" />
<line x1="1500" y1="408" x2="1160" y2="1148" stroke="#9a5a5a" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arrow)" />

<rect x="60" y="1280" width="2480" height="340" rx="10" fill="#ffffff" stroke="#c8d4e0" stroke-width="1.5" />
<text x="80" y="1318" class="boxTitle">Evidencias e rastreabilidade no codigo</text>
<text x="90" y="1358" class="boxText">
<tspan x="90" dy="0">- AuthController gera TokenResponse; TokenService assina JWT; controllers administrativos usam [Authorize].</tspan>
<tspan x="90" dy="34">- CustomersController, VehiclesController, ServicesController e PartsController compoem o catalogo administrativo.</tspan>
<tspan x="90" dy="34">- WorkOrderApplicationService orquestra criacao da OS, valida cliente/placa, monta itens e persiste alteracoes.</tspan>
<tspan x="90" dy="34">- WorkOrder concentra ciclo de vida, totais, historico e bloqueio de transicoes invalidas.</tspan>
<tspan x="90" dy="34">- PartSupply.RemoveFromStock impede estoque negativo durante a baixa de pecas/insumos.</tspan>
<tspan x="90" dy="34">- ClientTrackingController permite consulta publica sem expor a area administrativa.</tspan>
</text>
</svg>
