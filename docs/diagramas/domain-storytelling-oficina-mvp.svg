<text x="2460" y="1680" class="text">Documento divergente: tracking retorna 404.</text>

<text x="80" y="1845" class="small">Resumo: ator executa atividade numerada sobre objeto de trabalho; grupos delimitam cenarios; anotacoes registram regras, gatilhos, limitacoes e acoes pivotais.</text>
