apiVersion: v1
kind: Secret
metadata:
  name: oficina-api-secret
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-api
type: Opaque
stringData:
  Jwt__Key: "replace-with-at-least-32-characters"
  AdminCredentials__Password: "replace-with-admin-password"
  Integration__Token: "replace-with-integration-token"
  ConnectionStrings__DefaultConnection: "Host=oficina-postgres;Port=5432;Database=oficina;Username=oficina;Password=replace-with-postgres-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: oficina-postgres-secret
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-postgres
type: Opaque
stringData:
  POSTGRES_USER: "oficina"
  POSTGRES_PASSWORD: "replace-with-postgres-password"
