name: container

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ./src/OficinaMvp.Api/Dockerfile -t oficina-mvp-api:${{ github.sha }} .

      - name: Inspect image user
        run: docker image inspect oficina-mvp-api:${{ github.sha }} --format '{{.Config.User}}'
